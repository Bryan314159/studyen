name: Update Vocab

on:
  # 每周一 UTC 03:00 自动跑
  schedule:
    - cron: '0 3 * * 1'
  # 允许从 Actions 页面手动触发
  workflow_dispatch:
  # vocab.template.json 变更时触发（例如用户提交新词）
  push:
    paths:
      - 'data/vocab.template.json'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 强制使用 Node.js 24：v4/v5/v6 的 checkout/setup-python 在 Node 20 上仍能跑，
    # 但 GitHub 已宣布 2026-09-16 删除 Node 20 runner。
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build vocab
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/build_vocab.py

      - name: Commit and push (with rebase fallback)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/vocab.json data/vocab.template.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(vocab): update [skip ci]"
          # 第一次 push：失败则 fetch + rebase 后再试
          if ! git push; then
            echo "Push rejected (likely diverged). Rebasing onto origin/$GITHUB_REF_NAME..."
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
            git push
          fi